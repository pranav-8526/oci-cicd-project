name: CI/CD Pipeline for Containerized App

# Trigger the workflow when code is pushed to the 'main' branch, or a PR is made against it.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Define environment variables used throughout the jobs
env:
  REGISTRY: ghcr.io
  # IMAGE_NAME will resolve to github-username/repo-name
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # -------------------------------------------------------------
  # STAGE 1: Continuous Integration (Testing and Linting)
  # -------------------------------------------------------------
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        # npm ci is like npm install, but stricter and meant for automated environments
        run: npm ci || npm install

      - name: Run Automated Tests
        # Runs the "test" script defined in package.json
        run: npm test

  # -------------------------------------------------------------
  # STAGE 2: Build & Push Docker Image (Continuous Deployment Prep)
  # -------------------------------------------------------------
  build-and-push:
    name: Build & Push Docker Image
    needs: ci # This ensures this job only runs if the 'ci' job succeeds!
    runs-on: ubuntu-latest
    
    # We need specific permissions to push to the GitHub Container Registry (Packages)
    permissions:
      contents: read
      packages: write

    # Only run this step if we are actually pushing code (not just opening a Pull Request)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to the Container registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # GITHUB_TOKEN is automatically provided by GitHub Actions! No setup needed.

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag the image with both 'latest' and the git commit SHA (very important for rollback and version tracking)
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true # Push the image to the registry after building
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
